<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TZ Chess Pro</title>
    <meta name="description" content="Play professional online chess on TZ Chess Pro. Created by Trimukh Zone (TZ). Play with friends or bots.">
    <meta name="keywords" content="TZ Chess Pro, Trimukh Zone, Chess Game, Online Chess, TZ-Craft, TZ Mods">
    
    <meta property="og:title" content="TZ Chess Pro">
    <meta property="og:description" content="Professional Chess Game by Trimukh Zone. Play with friends online or challenge the bot!">
    <meta property="og:url" content="https://tz-chess-pro.onrender.com">
    <meta property="og:image" content="https://chessboardjs.com/img/chesspieces/wikipedia/wK.png"> 
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
    
<body>
    <div class="app-container">
        <div id="home-screen" class="screen">
            <h1 class="logo">TZ CHESS PRO</h1>
            <div class="stats-container">
                <div class="stat-box"><span>Matches</span><strong id="stat-total">0</strong></div>
                <div class="stat-box"><span>Wins</span><strong id="stat-wins">0</strong></div>
                <div class="stat-box"><span>Losses</span><strong id="stat-losses">0</strong></div>
            </div>
            <button class="btn-main" onclick="initGame('bot')"><i class="fas fa-robot"></i> PLAY WITH BOT</button>
            <button class="btn-main" onclick="showOnlineSetup()"><i class="fas fa-users"></i> PLAY WITH FRIEND</button>
        </div>

        <div id="online-setup" class="screen" style="display: none;">
            <h1 class="logo" style="margin-top: 50px;">Online Play</h1>
            <input type="text" id="room-id" placeholder="Enter Room Name...">
            <button class="btn-main" onclick="joinRoom()">JOIN / CREATE</button>
            <button class="btn-secondary" onclick="location.reload()">Back to Home</button>
        </div>

        <div id="waiting-screen" class="screen" style="display: none; justify-content: center;">
            <div class="loader-container">
                <h2 style="color: #ffeb3b;">Waiting...</h2>
                <p id="waiting-room-name" style="color: #888;"></p>
                <div class="spinner"></div>
                <button class="btn-secondary" onclick="location.reload()">Cancel</button>
            </div>
        </div>

        <div id="game-screen" class="screen" style="display: none;">
            <div class="game-header">
                <button class="btn-exit" onclick="location.reload()"><i class="fas fa-times"></i></button>
                <div id="status">Your Turn</div>
                <button class="btn-top-reset" onclick="resetGame()"><i class="fas fa-redo"></i></button>
            </div>
            
            <div id="captured-top" class="captured-box"></div>
            
            <div id="myBoard"></div>
            
            <div id="captured-bottom" class="captured-box"></div>
            
            <div id="room-display" style="color: #555; font-size: 0.8rem; margin-top: 10px;"></div>
        </div>

        <div id="game-over-overlay">
            <h1 style="color: #ff5252;">GAME OVER</h1>
            <p id="winner-text" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
            <button class="btn-main" onclick="location.reload()">MAIN MENU</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
