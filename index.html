<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>TZ Chess Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lib/chessboard-1.0.0.min.css">
</head>
    
<body>
    <div class="app-container">
        <div id="home-screen" class="screen">
            <div class="home-header-bar" style="justify-content: flex-end;">
                <div class="settings-menu-container">
                    <button class="btn-settings-gear" onclick="toggleSettingsDropdown()">⚙️</button>
                    <div id="settingsDropdown" class="dropdown-content settings-dropdown">
                        <button id="settings-auth-action-btn" onclick="handleSettingsAuthTrigger()">🔑 Sign Up / Log In</button>
                    </div>
                </div>
            </div>

            <h1 class="logo">TZ CHESS PRO</h1>
            <div class="stats-container">
                <div class="stat-box"><span>Matches</span><strong id="stat-total">0</strong></div>
                <div class="stat-box"><span>Wins</span><strong id="stat-wins">0</strong></div>
                <div class="stat-box"><span>Losses</span><strong id="stat-losses">0</strong></div>
            </div>
            <button class="btn-main" onclick="initGame('bot')">🤖 PLAY WITH BOT</button>
            <button class="btn-main" onclick="initGame('local')">⚔️ PASS & PLAY (2 PLAYER)</button>
            <button class="btn-main" onclick="checkFriendModeTrigger()">👥 PLAY WITH FRIEND</button>
        </div>

        <div id="auth-screen" class="screen" style="display: none; justify-content: center;">
            <h2 id="auth-header" style="color: #fff; text-align: center; font-size: 1.2rem; margin-bottom: 25px;">Sign up/log in first to play Friend Mode</h2>
            <div class="auth-box">
                <input type="text" id="auth-username" placeholder="Username (6-20 chars)">
                <input type="password" id="auth-password" placeholder="Password (8+ chars)">
                <p id="auth-error-msg" style="color:#ff5252; font-size:0.85rem; margin-top:-5px; margin-bottom:15px; text-align:center; display:none;"></p>
                
                <button class="btn-main" id="auth-submit-btn" onclick="performAuthSubmit()">CREATE NEW ACCOUNT</button>
                
                <div class="auth-switcher-container">
                    <p id="auth-switch-link-container">Already have an account? <span onclick="switchAuthMode('login')">Log In</span></p>
                </div>

                <button class="btn-secondary" onclick="goBackToHome()">Cancel</button>
            </div>
        </div>

        <div id="online-setup" class="screen" style="display: none;">
            <h1 class="logo" style="margin-top: 50px;">Online Play</h1>
            <div id="server-status-container">
                <p id="server-status">Connecting to Server...</p>
                <div id="countdown-timer" style="display: none;">Server starts in: <span id="timer-sec">50</span>s</div>
            </div>
            <input type="text" id="room-id" placeholder="Enter Room Name...">
            <button class="btn-main" id="btn-join" onclick="joinRoom()" disabled style="background: #444;">JOIN / CREATE</button>
            <button class="btn-secondary" onclick="goBackToHome()">Back to Home</button>
        </div>

        <div id="waiting-screen" class="screen" style="display: none; justify-content: center;">
            <div class="loader-container">
                <h2 style="color: #ffeb3b;">Waiting...</h2>
                <p id="waiting-room-name" style="color: #888;"></p>
                <div class="spinner"></div>
                <button class="btn-secondary" onclick="goBackToHome()">Cancel</button>
            </div>
        </div>

        <div id="game-screen" class="screen" style="display: none;">
            <div class="game-header">
                <div style="width: 30px;"></div>
                <div id="status">Your Turn</div>
                
                <div class="menu-dropdown-container">
                    <button class="btn-menu-dots" onclick="toggleMenuDropdown()">⋮</button>
                    <div id="myDropdown" class="dropdown-content">
                        <button id="menu-undo-btn" onclick="triggerUndo()">↩️ Undo Move</button>
                        <button onclick="triggerRestart()">🔄 Restart Game</button>
                        <button onclick="triggerExitMatch()">❌ Exit to Menu</button>
                    </div>
                </div>
            </div>
            
            <div id="captured-top" class="captured-box"></div>
            <div id="myBoard"></div>
            <div id="captured-bottom" class="captured-box"></div>
            <div id="room-display" style="color: #555; font-size: 0.8rem; margin-top: 10px;"></div>
        </div>

        <div id="game-over-overlay">
            <h1 style="color: #ff5252;">GAME OVER</h1>
            <p id="winner-text" style="font-size: 1.2rem; margin-bottom: 20px; text-align: center; padding: 0 10px;"></p>
            <div class="game-over-buttons-row">
                <button class="btn-main row-btn" id="btn-play-again" onclick="triggerPlayAgain()">🎮 PLAY AGAIN</button>
                <button class="btn-secondary row-btn" onclick="goBackToHome()" style="color: #fff; border-color: #555; margin-top: 0;">MAIN MENU</button>
            </div>
        </div>

        <div id="custom-confirm-box" class="custom-modal">
            <div class="modal-content">
                <p id="confirm-message">You want to exit the game?</p>
                <div class="modal-buttons">
                    <button class="modal-btn yes" id="confirm-yes-btn">YES</button>
                    <button class="modal-btn no" id="confirm-no-btn" onclick="closeConfirmModal()">NO</button>
                </div>
            </div>
        </div>
    </div>

    <script src="lib/jquery-3.5.1.min.js"></script>
    <script src="lib/chess.min.js"></script>
    <script src="lib/chessboard-1.0.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
